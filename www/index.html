<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>REALM CONQUEST</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body {
  width:100%; height:100%; overflow:hidden;
  background:#000; touch-action:none;
  font-family:'Segoe UI',sans-serif;
}
#canvas { display:block; width:100vw; height:100vh; }



/* ===== HUD ===== */
#hud {
  position:fixed; inset:0;
  pointer-events:none; z-index:20;
  /* Safe area for notch */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ===== TOP LEFT — Map + Menu ===== */
#top-left {
  position:absolute; top:14px; left:14px;
  display:flex; flex-direction:column; gap:8px;
  pointer-events:all;
}

/* Minimap circle */
#minimap-wrap {
  width:88px; height:88px;
  position:relative; cursor:pointer;
}
#minimap-canvas {
  width:88px; height:88px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.35);
  box-shadow:0 0 12px rgba(0,0,0,0.5);
  display:block;
}
.minimap-icon {
  position:absolute; top:4px; right:4px;
  width:18px; height:18px; border-radius:50%;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.3);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; color:rgba(255,255,255,0.8);
}

/* Menu buttons row */
#menu-row {
  display:flex; gap:6px;
}
.menu-btn {
  width:32px; height:32px; border-radius:50%;
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; cursor:pointer;
  backdrop-filter:blur(6px);
  color:rgba(255,255,255,0.85);
  transition:all 0.15s;
}
.menu-btn:active { transform:scale(0.88); background:rgba(255,255,255,0.15); }

/* ===== TOP RIGHT — Char info small ===== */
#top-right {
  position:absolute; top:14px; right:14px;
  display:flex; gap:6px; align-items:center;
  pointer-events:none;
}
.chip {
  background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.15);
  border-radius:16px; padding:4px 10px;
  font-size:11px; font-weight:600; color:#f0c040;
  backdrop-filter:blur(6px);
}

/* Kill feed top right below chips */
#killfeed {
  position:absolute; top:50px; right:14px;
  display:flex; flex-direction:column; gap:3px; align-items:flex-end;
  pointer-events:none;
}
.kf-item {
  background:rgba(0,0,0,0.6); border-radius:10px;
  padding:3px 10px; font-size:10px; color:#ef9a9a;
  border:1px solid rgba(239,83,80,0.3);
  animation:kfFade 3s ease-out forwards;
  backdrop-filter:blur(4px);
}
@keyframes kfFade{0%,70%{opacity:1}100%{opacity:0}}

/* ===== BOTTOM CENTER — HP/MP/Enemy bars ===== */
#bottom-center {
  position:absolute; bottom:16px;
  left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px;
  min-width:220px;
  pointer-events:none;
}

/* Enemy bar — shows when near enemy */
#enemy-bar {
  display:none;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(239,83,80,0.4);
  border-radius:20px; padding:5px 14px;
  min-width:200px; text-align:center;
  backdrop-filter:blur(6px);
}
#enemy-bar.visible { display:block; }
.enemy-name-hud { font-size:10px; color:#ef9a9a; margin-bottom:3px; letter-spacing:0.5px; }
.bar-wrap { height:7px; background:rgba(0,0,0,0.5); border-radius:4px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); margin-bottom:1px; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.3s; }
.enemy-hp-fill { background:linear-gradient(90deg,#b71c1c,#ef5350); }
.bar-label { font-size:9px; color:rgba(255,255,255,0.5); text-align:center; }

/* Player HP/MP */
#player-bars {
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px; padding:7px 16px;
  min-width:200px;
  backdrop-filter:blur(8px);
}
.player-name-hud { font-size:11px; font-weight:700; color:#f0c040; margin-bottom:4px; letter-spacing:1px; text-align:center; }
.hp-fill { background:linear-gradient(90deg,#43a047,#66bb6a); }
.mp-fill { background:linear-gradient(90deg,#1565c0,#42a5f5); }
.bar-label-row { font-size:9px; color:rgba(255,255,255,0.55); display:flex; justify-content:space-between; }

/* ===== LEFT — Joystick (Genshin style) ===== */
#joystick-zone {
  position:absolute; bottom:24px; left:24px;
  width:140px; height:140px;
  pointer-events:all;
}
#joystick-base {
  width:120px; height:120px; border-radius:50%;
  background:rgba(255,255,255,0.04);
  border:1.5px solid rgba(255,255,255,0.12);
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
}
#joystick-knob {
  width:48px; height:48px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%, rgba(255,255,255,0.5), rgba(255,255,255,0.08));
  border:1.5px solid rgba(255,255,255,0.25);
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}

/* ===== RIGHT — Genshin-style action buttons ===== */
#right-actions {
  position:absolute; bottom:20px; right:16px;
  pointer-events:all;
  width:220px; height:200px;
  position:absolute; bottom:16px; right:12px;
}

/* Skill buttons in arc like Genshin */
.action-btn {
  position:absolute;
  border-radius:50%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; user-select:none;
  transition:transform 0.1s;
  border:2px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(8px);
}
.action-btn:active { transform:scale(0.82) !important; }

/* Main attack — big, center right */
#btn-attack {
  width:70px; height:70px;
  background:radial-gradient(circle, rgba(180,30,30,0.85), rgba(100,0,0,0.9));
  border-color:rgba(239,83,80,0.6);
  box-shadow:0 0 18px rgba(239,83,80,0.4);
  bottom:10px; right:10px;
  font-size:26px;
}
#btn-attack .btn-lbl { font-size:8px; color:rgba(255,255,255,0.7); margin-top:1px; }

/* Jump — upper right of attack */
#btn-jump-old {
  width:54px; height:54px;
  background:radial-gradient(circle, rgba(21,101,192,0.85), rgba(10,50,120,0.9));
  border-color:rgba(66,165,245,0.6);
  box-shadow:0 0 12px rgba(66,165,245,0.3);
  bottom:72px; right:72px;
  font-size:20px;
}
#btn-jump .btn-lbl { font-size:7px; color:rgba(255,255,255,0.6); margin-top:1px; }

/* Skill 0 — top */
#btn-s0 {
  width:52px; height:52px;
  background:radial-gradient(circle, rgba(21,101,192,0.8), rgba(10,40,100,0.9));
  border-color:rgba(66,165,245,0.5);
  bottom:140px; right:10px;
  font-size:18px;
}
/* Skill 1 — top left of attack */
#btn-s1 {
  width:52px; height:52px;
  background:radial-gradient(circle, rgba(106,17,203,0.8), rgba(60,10,120,0.9));
  border-color:rgba(156,39,176,0.5);
  bottom:140px; right:70px;
  font-size:18px;
}
/* Skill 2 — left of attack */
#btn-s2 {
  width:52px; height:52px;
  background:radial-gradient(circle, rgba(27,94,32,0.8), rgba(15,50,15,0.9));
  border-color:rgba(102,187,106,0.5);
  bottom:72px; right:140px;
  font-size:18px;
}
/* Skill 3 — top far */
#btn-s3 {
  width:52px; height:52px;
  background:radial-gradient(circle, rgba(180,120,0,0.8), rgba(100,60,0,0.9));
  border-color:rgba(255,215,0,0.5);
  bottom:10px; right:80px;
  font-size:18px;
}

.btn-lbl { font-size:7px; color:rgba(255,255,255,0.6); margin-top:1px; letter-spacing:0.3px; }
.cd-ring {
  position:absolute; inset:0; border-radius:50%;
  background:rgba(0,0,0,0.6);
  display:none; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#fff;
}
.on-cd .cd-ring { display:flex; }
.on-cd { opacity:0.5; }

/* ===== DAMAGE NUMBERS ===== */
.dmg-num {
  position:fixed; font-size:22px; font-weight:900;
  pointer-events:none; z-index:50;
  text-shadow:0 2px 6px #000;
  animation:dmgFloat 1.1s ease-out forwards;
}
.dmg-num.crit { color:#ffd700; font-size:30px; }
.dmg-num.normal { color:#ff8a80; }
.dmg-num.heal { color:#69f0ae; }
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(0.6);}30%{opacity:1;transform:translateY(-28px) scale(1.2);}100%{opacity:0;transform:translateY(-70px) scale(0.8);}}

/* ===== NOTIFICATION ===== */
#notif {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) translateY(-60px);
  background:rgba(10,14,30,0.88);
  border:1px solid rgba(240,192,64,0.5); border-radius:20px;
  padding:7px 20px; font-size:12px; font-weight:600; color:#f0c040;
  backdrop-filter:blur(8px); opacity:0; transition:all 0.3s;
  white-space:nowrap; pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
#notif.show { opacity:1; transform:translate(-50%,-50%) translateY(-80px); }

/* ===== HIT FLASH ===== */
#hit-flash {
  position:fixed; inset:0; background:rgba(239,83,80,0.22);
  pointer-events:none; z-index:9; opacity:0; transition:opacity 0.08s;
}
#hit-flash.show { opacity:1; }

/* ===== PAUSE MENU ===== */
#pause-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  z-index:100; display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(8px);
}
#pause-overlay.show { display:flex; }
#pause-box {
  background:linear-gradient(135deg,#0d1428,#1a2040);
  border:1px solid rgba(240,192,64,0.3);
  border-radius:20px; padding:30px 40px;
  text-align:center; min-width:220px;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}
.pause-title {
  font-size:22px; font-weight:900; letter-spacing:3px;
  background:linear-gradient(135deg,#f0c040,#fff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}
.pause-btn {
  display:block; width:100%; padding:12px;
  border-radius:12px; border:none; cursor:pointer;
  font-size:13px; font-weight:700; letter-spacing:1px;
  margin-bottom:10px; transition:all 0.2s;
}
.pause-btn.resume { background:linear-gradient(135deg,#f0c040,#b8860b); color:#0a0c14; }
.pause-btn.resume:active { transform:scale(0.96); }
.pause-btn.quit { background:rgba(239,83,80,0.15); color:#ef9a9a; border:1px solid rgba(239,83,80,0.3); }
.pause-stats { margin:16px 0; font-size:11px; color:rgba(255,255,255,0.5); line-height:1.8; }

/* ===== BIG MAP OVERLAY ===== */
#bigmap-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.82);
  z-index:90; display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
#bigmap-overlay.show { display:flex; }
#bigmap-wrap {
  position:relative;
  width:min(90vw,90vh);
  height:min(90vw,90vh);
}
#bigmap-canvas {
  width:100%; height:100%;
  border-radius:16px;
  border:2px solid rgba(240,192,64,0.4);
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}
#bigmap-close {
  position:absolute; top:-14px; right:-14px;
  width:32px; height:32px; border-radius:50%;
  background:rgba(239,83,80,0.8); color:white;
  border:none; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  pointer-events:all;
}
#bigmap-title {
  position:absolute; top:-40px; left:0; right:0;
  text-align:center; font-size:14px; font-weight:700;
  color:#f0c040; letter-spacing:2px;
}
.bigmap-legend {
  position:absolute; bottom:-44px; left:0; right:0;
  display:flex; justify-content:center; gap:16px;
}
.legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:rgba(255,255,255,0.6); }
.legend-dot { width:10px; height:10px; border-radius:50%; }

/* ===== LOADING ===== */
#loading {
  position:fixed; inset:0; background:#060912;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:200; transition:opacity 0.6s;
}
#loading.hidden { opacity:0; pointer-events:none; }
.load-logo { font-size:26px; font-weight:900; letter-spacing:3px; background:linear-gradient(135deg,#f0c040,#fff,#f0c040); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.load-sub { font-size:10px; color:#4a5568; margin-bottom:24px; letter-spacing:2px; }
.load-bar-wrap { width:180px; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
.load-bar { height:100%; background:linear-gradient(90deg,#f0c040,#fff); border-radius:2px; width:0%; transition:width 0.3s; }
.load-tip { margin-top:12px; font-size:10px; color:#4a5568; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hit-flash"></div>

<!-- HUD -->
<div id="hud">

  <!-- TOP LEFT: Minimap + Menu -->
  <div id="top-left">
    <div id="minimap-wrap" onclick="toggleBigMap()">
      <canvas id="minimap-canvas" width="88" height="88"></canvas>
      <div class="minimap-icon">🗺</div>
    </div>
    <div id="menu-row">
      <div class="menu-btn" onclick="togglePause()">⏸</div>
      <div class="menu-btn" id="kill-btn">⚔0</div>
      <div class="menu-btn">💎2.4k</div>
    </div>
  </div>

  <!-- TOP RIGHT: nothing important, clean -->
  <div id="top-right"></div>

  <!-- KILL FEED -->
  <div id="killfeed"></div>

  <!-- BOTTOM CENTER: HP/MP + Enemy -->
  <div id="bottom-center">
    <div id="enemy-bar">
      <div class="enemy-name-hud" id="enemy-name-hud">Ra Savaşçısı</div>
      <div class="bar-wrap"><div class="bar-fill enemy-hp-fill" id="enemy-hp-bar" style="width:100%"></div></div>
      <div class="bar-label" id="enemy-hp-txt">3200/3200</div>
    </div>
    <div id="player-bars">
      <div class="player-name-hud">ZEPHYR — Lv.42</div>
      <div class="bar-wrap"><div class="bar-fill hp-fill" id="hp-bar" style="width:100%"></div></div>
      <div class="bar-label-row"><span>HP</span><span id="hp-txt">8500/8500</span></div>
      <div class="bar-wrap" style="margin-top:3px"><div class="bar-fill mp-fill" id="mp-bar" style="width:100%"></div></div>
      <div class="bar-label-row"><span>MP</span><span id="mp-txt">3200/3200</span></div>
    </div>
  </div>

  <!-- LEFT: Joystick -->
  <div id="jump-left-btn" 
  ontouchstart="doJump(event)" 
  onmousedown="doJump(event)"
  style="
    position:absolute;
    bottom:175px;
    left:30px;
    width:58px;height:58px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(21,101,192,0.85),rgba(10,50,120,0.9));
    border:2px solid rgba(66,165,245,0.6);
    box-shadow:0 0 14px rgba(66,165,245,0.3);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-size:22px;
    pointer-events:all;
    touch-action:none;
    user-select:none;
    z-index:30;
    cursor:pointer;
  ">🦘<span style='font-size:8px;color:rgba(255,255,255,0.7);margin-top:1px'>ZIPla</span></div>
<div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>

  <!-- RIGHT: Action buttons (Genshin layout) -->
  <div id="right-actions" style="touch-action:none">
    <div class="action-btn" id="btn-attack" ontouchstart="doAttack(event)" onmousedown="doAttack(event)">
      ⚔<span class="btn-lbl">VUR</span>
    </div>

    <div class="action-btn" id="btn-s0" ontouchstart="useSkill(0,event)" onmousedown="useSkill(0,event)">
      ⚡<span class="btn-lbl">ŞIMŞEK</span>
      <div class="cd-ring" id="scd0"></div>
    </div>
    <div class="action-btn" id="btn-s1" ontouchstart="useSkill(1,event)" onmousedown="useSkill(1,event)">
      🌀<span class="btn-lbl">GIRDAP</span>
      <div class="cd-ring" id="scd1"></div>
    </div>
    <div class="action-btn" id="btn-s2" ontouchstart="useSkill(2,event)" onmousedown="useSkill(2,event)">
      💚<span class="btn-lbl">İYİLEŞ</span>
      <div class="cd-ring" id="scd2"></div>
    </div>
    <div class="action-btn" id="btn-s3" ontouchstart="useSkill(3,event)" onmousedown="useSkill(3,event)">
      💥<span class="btn-lbl">PATLAMA</span>
      <div class="cd-ring" id="scd3"></div>
    </div>
  </div>

  <div id="notif"></div>
</div>

<!-- Pause Menu -->
<div id="pause-overlay">
  <div id="pause-box">
    <div class="pause-title">DURAKLATILDI</div>
    <div class="pause-stats" id="pause-stats">
      ⚔ Kill: 0 &nbsp;|&nbsp; 💎 2,450<br>
      HP: 8500 / 8500<br>
      MP: 3200 / 3200
    </div>
    <button class="pause-btn resume" onclick="togglePause()">▶ DEVAM ET</button>
    <button class="pause-btn quit" onclick="location.reload()">↩ YENİDEN BAŞLA</button>
  </div>
</div>

<!-- Big Map Overlay -->
<div id="bigmap-overlay" onclick="closeBigMap()">
  <div id="bigmap-wrap" onclick="event.stopPropagation()">
    <div id="bigmap-title">🗺 DÜNYA HARİTASI</div>
    <canvas id="bigmap-canvas" width="600" height="600"></canvas>
    <button id="bigmap-close" onclick="closeBigMap()">✕</button>
    <div class="bigmap-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4fc3f7"></div>Sen</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff4444"></div>Düşman</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2d6e2d"></div>Orman</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9a8a7a"></div>Harabeler</div>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="load-logo">REALM CONQUEST</div>
  <div class="load-sub">V4.0 — GENSHIN UI</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
  <div class="load-tip" id="load-tip">Dünya yükleniyor...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== LOADING =====
const loadSteps=[[15,'Arazi oluşturuluyor...'],[35,'Gökyüzü hazırlanıyor...'],[55,'Ağaçlar dikiliyor...'],[75,'Düşmanlar yerleştiriliyor...'],[90,'UI hazırlanıyor...'],[100,'Hazır!']];
let loadIdx=0;
function nextLoad(){
  if(loadIdx>=loadSteps.length)return;
  const[p,m]=loadSteps[loadIdx++];
  document.getElementById('load-bar').style.width=p+'%';
  document.getElementById('load-tip').textContent=m;
  if(loadIdx<loadSteps.length)setTimeout(nextLoad,300);
  else setTimeout(()=>{document.getElementById('loading').classList.add('hidden');showNotif('🎮 Realm Conquest V4 — Genshin UI!');},500);
}
setTimeout(nextLoad,200);

// ===== PAUSE =====
let paused=false;
function togglePause(){
  paused=!paused;
  document.getElementById('pause-overlay').classList.toggle('show',paused);
  if(paused){
    const s=document.getElementById('pause-stats');
    s.innerHTML=`⚔ Kill: ${killCount} &nbsp;|&nbsp; 💎 2,450<br>HP: ${Math.floor(pState.hp)} / ${pState.maxHp}<br>MP: ${Math.floor(pState.mp)} / ${pState.maxMp}`;
  }
}

// ===== BIG MAP =====
let bigMapOpen=false;
function toggleBigMap(){bigMapOpen=true;document.getElementById('bigmap-overlay').classList.add('show');drawBigMap();}
function closeBigMap(){bigMapOpen=false;document.getElementById('bigmap-overlay').classList.remove('show');}

// ===== RENDERER =====
const canvas=document.getElementById('canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x87ceeb,0.014);

// ===== TERRAIN =====
const WORLD=120;
const terrainGeo=new THREE.PlaneGeometry(WORLD*2,WORLD*2,100,100);
terrainGeo.rotateX(-Math.PI/2);
const tPos=terrainGeo.attributes.position;

function getTerrainHeight(x,z){
  const dist=Math.sqrt(x*x+z*z);
  const flat=Math.max(0,1-dist/25);
  return Math.max(0,(
    Math.sin(x*0.12)*2.5+Math.cos(z*0.10)*2+
    Math.sin(x*0.035+z*0.04)*5+
    Math.cos(x*0.07)*Math.sin(z*0.06)*4+
    Math.sin(x*0.22)*0.8+Math.cos(z*0.18)*0.6
  )*(1-flat*0.95));
}

const tColors=[];
for(let i=0;i<tPos.count;i++){
  const x=tPos.getX(i),z=tPos.getZ(i);
  tPos.setY(i,getTerrainHeight(x,z));
  const y=tPos.getY(i);
  if(y<0.3)tColors.push(0.28,0.52,0.22);
  else if(y<1.5)tColors.push(0.25,0.48,0.18);
  else if(y<3.5)tColors.push(0.3,0.42,0.22);
  else if(y<5.5)tColors.push(0.48,0.44,0.35);
  else tColors.push(0.75,0.72,0.68);
}
terrainGeo.setAttribute('color',new THREE.Float32BufferAttribute(tColors,3));
terrainGeo.computeVertexNormals();

const hRay=new THREE.Raycaster();
function getHeightAt(x,z){
  hRay.set(new THREE.Vector3(x,30,z),new THREE.Vector3(0,-1,0));
  const hits=hRay.intersectObject(terrain);
  return hits.length>0?hits[0].point.y:0;
}

const ruinPositions=[];
function makeRuin(x,z){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0x9a8a7a});
  const base=new THREE.Mesh(new THREE.BoxGeometry(10,0.5,10),mat);
  base.position.y=0.25;base.castShadow=true;g.add(base);
  for(let i=0;i<4;i++){
    const h=2+Math.random()*3.5;
    const col=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,h,8),mat);
    const cx=i<2?-3.5:3.5,cz=i%2===0?-3.5:3.5;
    col.position.set(cx,h/2+0.5,cz);col.castShadow=true;g.add(col);
  }
  const rh=getHeightAt(x,z);g.position.set(x,rh,z);
  ruinPositions.push({x,z});
  return g;
}

const projectiles=[];
function spawnProjectile(from,to,color,dmg,isPlayer){
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.12,7,7),new THREE.MeshBasicMaterial({color}));
  const glow=new THREE.Mesh(new THREE.SphereGeometry(0.22,7,7),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.3}));
  mesh.add(glow);mesh.position.copy(from);scene.add(mesh);
  const dir=new THREE.Vector3().subVectors(to,from).normalize();
  projectiles.push({mesh,dir,speed:22,dmg,isPlayer,life:3.0});
}

function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];p.life-=dt;
    p.mesh.position.addScaledVector(p.dir,p.speed*dt);
    if(p.life<=0){scene.remove(p.mesh);projectiles.splice(i,1);continue;}
    if(p.isPlayer){
      enemies.forEach(e=>{
        if(e.dead)return;
        const dx=p.mesh.position.x-e.mesh.position.x,dz=p.mesh.position.z-e.mesh.position.z;
        if(dx*dx+dz*dz<(0.8*e.def.scale)*(0.8*e.def.scale)&&Math.abs(p.mesh.position.y-e.mesh.position.y-1)<2){
          hitEnemy(e,p.dmg,false);
          createParticles(p.mesh.position.x,p.mesh.position.y,p.mesh.position.z,p.mesh.material.color.getHex(),10,1.5);
          scene.remove(p.mesh);projectiles.splice(i,1);
        }
      });
    } else {
      const dx=p.mesh.position.x-player.position.x,dz=p.mesh.position.z-player.position.z;
      if(dx*dx+dz*dz<0.8&&Math.abs(p.mesh.position.y-player.position.y-1)<2){
        pState.hp-=p.dmg;showDmg(p.dmg,false,false);hitFlash();updateHUD();
        scene.remove(p.mesh);projectiles.splice(i,1);
        if(pState.hp<=0)respawnPlayer();
      }
    }
  }
}

// ===== JOYSTICK =====
const jZone=document.getElementById('joystick-zone');
const jKnob=document.getElementById('joystick-knob');
const jBase=document.getElementById('joystick-base');
let jActive=false,jTouchId=null,jDx=0,jDz=0;
const jRadius=42;let jCX,jCY;
function getJCenter(){const r=jBase.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function moveJoystick(cx,cy){
  let dx=cx-jCX,dy=cy-jCY;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>jRadius){dx=dx/d*jRadius;dy=dy/d*jRadius;}
  jKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  jDx=dx/jRadius;jDz=dy/jRadius;
}
// JOYSTICK - Document level multi-touch
// Joystick zone rect for hit detection
function isInJoystickZone(x, y) {
  const r = jZone.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

document.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) {
    if (jTouchId === null && isInJoystickZone(t.clientX, t.clientY)) {
      jActive = true;
      jTouchId = t.identifier;
      const c = getJCenter();
      jCX = c.x; jCY = c.y;
      moveJoystick(t.clientX, t.clientY);
      // Don't preventDefault here — let other touches pass through
    }
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === jTouchId) {
      moveJoystick(t.clientX, t.clientY);
    }
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === jTouchId) {
      jActive = false; jDx = 0; jDz = 0;
      jTouchId = null;
      jKnob.style.transform = 'translate(-50%,-50%)';
    }
  }
}, { passive: true });

    }
  }
},{passive:true});

function checkCollision(nx,nz,radius){
  for(const t of treePositions){const dx=nx-t.x,dz=nz-t.z;if(dx*dx+dz*dz<(t.r+radius)*(t.r+radius))return true;}
  for(const r of rockObjects){const dx=nx-r.x,dz=nz-r.z;if(dx*dx+dz*dz<(r.r+radius)*(r.r+radius)&&player.position.y<r.topY-0.2)return true;}
  for(const e of enemies){if(e.dead)continue;const dx=nx-e.mesh.position.x,dz=nz-e.mesh.position.z;const er=0.5*e.def.scale;if(dx*dx+dz*dz<(er+radius)*(er+radius))return true;}
  return false;
}

// ===== JUMP =====
let jumpCD=0;
function doJump(e){
  if(e)e.preventDefault();
  const groundY=getHeightAt(player.position.x,player.position.z);
  const nearGround=player.position.y<groundY+0.8;
  if(jumpCD<=0&&nearGround){
    pState.velY=JUMP_FORCE;
    pState.onGround=false;
    jumpCD=0.9;
    createParticles(player.position.x,player.position.y,player.position.z,0xffffff,8,1.5);
  }
}

// ===== ATTACK =====
let attackCD=0;
function doAttack(e){
  if(e)e.preventDefault();
  if(attackCD>0)return;attackCD=0.5;
  const ne=getNearestEnemy(6);
  if(ne){
    const dmg=700+Math.random()*500;const isCrit=Math.random()<0.22;
    hitEnemy(ne,isCrit?dmg*1.9:dmg,isCrit);
    createParticles(ne.mesh.position.x,1.2,ne.mesh.position.z,0xff4444,15,2.5);
    const ra=player.getObjectByName('rightArm');
    if(ra){ra.rotation.x=-1.2;setTimeout(()=>{if(ra)ra.rotation.x=0;},200);}
  } else {
    const ne2=getNearestEnemy(30);
    const sp=player.position.clone().add(new THREE.Vector3(0.42,1.85,0));
    const target=ne2?ne2.mesh.position.clone().add(new THREE.Vector3(0,1,0)):new THREE.Vector3(player.position.x+Math.sin(-camYaw)*15,player.position.y+1.5,player.position.z-Math.cos(-camYaw)*15);
    spawnProjectile(sp,target,0x4fc3f7,400,true);
    const ra=player.getObjectByName('rightArm');
    if(ra){ra.rotation.x=-0.8;setTimeout(()=>{if(ra)ra.rotation.x=0;},200);}
  }
}

function hitEnemy(enemy,dmg,isCrit){
  if(enemy.dead)return;
  enemy.hp-=dmg;showDmg(dmg,isCrit,false);
  const bar=enemy.mesh.getObjectByName('hpbar');
  if(bar){const pct=Math.max(0,enemy.hp/enemy.maxHp);bar.scale.x=pct;bar.position.x=-(1-pct)*0.45*enemy.def.scale;}
  if(enemy.hp<=0){
    enemy.dead=true;killCount++;
    addKillFeed('⚔ '+enemy.def.name+' yenildi! +'+enemy.def.reward+' 💎');
    createParticles(enemy.mesh.position.x,1.5,enemy.mesh.position.z,enemy.def.bodyColor,35,5);
    setTimeout(()=>scene.remove(enemy.mesh),300);
    setTimeout(()=>{
      const angle=Math.random()*Math.PI*2,dist=18+Math.random()*45;
      const def=ENEMY_DEFS[Math.floor(Math.random()*ENEMY_DEFS.length)];
      enemies.push(makeEnemy(def,Math.cos(angle)*dist,Math.sin(angle)*dist));
      const idx=enemies.indexOf(enemy);if(idx>-1)enemies.splice(idx,1);
    },8000);
  }
}

function getNearestEnemy(maxDist){
  let nearest=null,nd=maxDist*maxDist;
  enemies.forEach(e=>{
    if(e.dead)return;
    const dx=e.mesh.position.x-player.position.x,dz=e.mesh.position.z-player.position.z;
    const d2=dx*dx+dz*dz;if(d2<nd){nd=d2;nearest=e;}
  });
  return nearest;
}

function respawnPlayer(){pState.hp=pState.maxHp*0.35;player.position.set(0,0,0);pState.velY=0;updateHUD();showNotif('💀 Yenildiniz! Başlangıca döndünüz.');}

// ===== SKILLS =====
function useSkill(idx,e){
  if(e)e.preventDefault();
  const sk=skillDefs[idx];
  if(skillCDs[idx]>0)return;
  if(pState.mp<sk.mpCost){showNotif('❌ Yeterli MP yok!');return;}
  pState.mp-=sk.mpCost;skillCDs[idx]=sk.cd;
  if(sk.heal){
    pState.hp=Math.min(pState.maxHp,pState.hp+sk.heal);
    showDmg(sk.heal,false,true);
    createParticles(player.position.x,1.5,player.position.z,sk.color,25,2.5);
    showNotif('💚 '+sk.name+': +'+sk.heal.toLocaleString()+' HP');
  } else if(sk.projectile){
    const sp=new THREE.Vector3(player.position.x+0.42,player.position.y+1.85,player.position.z);
    const ne=getNearestEnemy(sk.range);
    const target=ne?ne.mesh.position.clone().add(new THREE.Vector3(0,1,0)):new THREE.Vector3(player.position.x+Math.sin(-camYaw)*sk.range,player.position.y+1.5,player.position.z-Math.cos(-camYaw)*sk.range);
    for(let i=0;i<3;i++)setTimeout(()=>{const t2=target.clone().add(new THREE.Vector3((Math.random()-.5)*0.5,0,(Math.random()-.5)*0.5));spawnProjectile(sp.clone(),t2,sk.color,400+Math.random()*300,true);},i*100);
    showNotif('⚡ '+sk.name+'!');
  } else if(sk.aoe){
    const dmg=sk.dmg[0]+Math.random()*(sk.dmg[1]-sk.dmg[0]);
    const isCrit=Math.random()<0.3;const fd=isCrit?dmg*2:dmg;
    createParticles(player.position.x,1.5,player.position.z,sk.color,40,sk.range*0.5);
    let hit=0;
    enemies.forEach(e=>{
      if(e.dead)return;
      const dx=e.mesh.position.x-player.position.x,dz=e.mesh.position.z-player.position.z;
      if(dx*dx+dz*dz<sk.range*sk.range){hitEnemy(e,fd*0.75,isCrit);hit++;}
    });
    showNotif((isCrit?'💥 KRİTİK! ':'✨ ')+sk.name+': '+Math.floor(fd*0.75).toLocaleString()+' ('+hit+' düşman)');
  }
  updateHUD();
}

function updateSkillUI(dt){
  skillCDs.forEach((cd,i)=>{
    skillCDs[i]=Math.max(0,cd-dt);
    const btn=document.getElementById('btn-s'+i);
    const ov=document.getElementById('scd'+i);
    if(skillCDs[i]>0){btn.classList.add('on-cd');ov.textContent=Math.ceil(skillCDs[i]);}
    else btn.classList.remove('on-cd');
  });
}

// ===== HUD =====
let killCount=0;let nearestEnemy=null;
function updateHUD(){
  document.getElementById('hp-bar').style.width=Math.max(0,pState.hp/pState.maxHp*100)+'%';
  document.getElementById('hp-txt').textContent=Math.max(0,Math.floor(pState.hp))+'/'+pState.maxHp;
  document.getElementById('mp-bar').style.width=Math.max(0,pState.mp/pState.maxMp*100)+'%';
  document.getElementById('mp-txt').textContent=Math.max(0,Math.floor(pState.mp))+'/'+pState.maxMp;
  document.getElementById('kill-btn').textContent='⚔'+killCount;
}
function updateEnemyHUD(){
  const eb=document.getElementById('enemy-bar');
  if(nearestEnemy&&!nearestEnemy.dead){
    eb.classList.add('visible');
    document.getElementById('enemy-name-hud').textContent=nearestEnemy.def.emoji+' '+nearestEnemy.def.name;
    document.getElementById('enemy-hp-bar').style.width=Math.max(0,nearestEnemy.hp/nearestEnemy.maxHp*100)+'%';
    document.getElementById('enemy-hp-txt').textContent=Math.max(0,Math.floor(nearestEnemy.hp))+'/'+nearestEnemy.maxHp;
  }else eb.classList.remove('visible');
}
function showDmg(dmg,isCrit,isHeal){
  const el=document.createElement('div');
  el.className='dmg-num '+(isHeal?'heal':isCrit?'crit':'normal');
  el.textContent=(isHeal?'+':'-')+Math.floor(dmg).toLocaleString();
  el.style.left=(25+Math.random()*50)+'%';el.style.top=(25+Math.random()*25)+'%';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1100);
}
function addKillFeed(msg){
  const kf=document.getElementById('killfeed');
  const el=document.createElement('div');el.className='kf-item';el.textContent=msg;
  kf.appendChild(el);setTimeout(()=>el.remove(),3000);
}
function showNotif(msg){
  const n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2800);
}
function hitFlash(){const f=document.getElementById('hit-flash');f.classList.add('show');setTimeout(()=>f.classList.remove('show'),120);}

// ===== MINIMAP =====
const mmCtx=document.getElementById('minimap-canvas').getContext('2d');

function drawTerrainOnCanvas(ctx, W, scale, offsetX, offsetZ){
  // Draw terrain colors based on height
  const step=4;
  for(let px=0;px<W;px+=step){
    for(let py=0;py<W;py+=step){
      const wx=(px-W/2)/scale+offsetX;
      const wz=(py-W/2)/scale+offsetZ;
      const h=getTerrainHeight(wx,wz);
      let color;
      if(h<0.3)color='#3a8c3a';
      else if(h<1.5)color='#2d7a2d';
      else if(h<3.5)color='#4a6a35';
      else if(h<5.5)color='#7a6a55';
      else color='#c0b8a8';
      ctx.fillStyle=color;
      ctx.fillRect(px,py,step,step);
    }
  }
}

function drawMinimap(){
  const W=88,scale=W/(WORLD*0.8);
  mmCtx.clearRect(0,0,W,W);
  mmCtx.save();
  mmCtx.beginPath();mmCtx.arc(W/2,W/2,W/2,0,Math.PI*2);mmCtx.clip();
  // Terrain
  drawTerrainOnCanvas(mmCtx,W,scale,player.position.x,player.position.z);
  // Trees
  mmCtx.fillStyle='rgba(20,60,20,0.6)';
  treePositions.forEach(t=>{
    const mx=W/2+(t.x-player.position.x)*scale,my=W/2+(t.z-player.position.z)*scale;
    if(mx>0&&mx<W&&my>0&&my<W){mmCtx.beginPath();mmCtx.arc(mx,my,2,0,Math.PI*2);mmCtx.fill();}
  });
  // Ruins
  mmCtx.fillStyle='rgba(150,130,120,0.7)';
  ruinPositions.forEach(r=>{
    const mx=W/2+(r.x-player.position.x)*scale,my=W/2+(r.z-player.position.z)*scale;
    if(mx>0&&mx<W&&my>0&&my<W){mmCtx.fillRect(mx-3,my-3,6,6);}
  });
  // Enemies
  enemies.forEach(e=>{
    if(e.dead)return;
    const mx=W/2+(e.mesh.position.x-player.position.x)*scale,my=W/2+(e.mesh.position.z-player.position.z)*scale;
    if(mx>-2&&mx<W+2&&my>-2&&my<W+2){mmCtx.fillStyle=e.aggro?'#ff2222':'#ff8888';mmCtx.beginPath();mmCtx.arc(mx,my,3,0,Math.PI*2);mmCtx.fill();}
  });
  // Player center dot + direction
  mmCtx.fillStyle='#4fc3f7';mmCtx.beginPath();mmCtx.arc(W/2,W/2,4,0,Math.PI*2);mmCtx.fill();
  mmCtx.strokeStyle='#ffffff';mmCtx.lineWidth=1.5;
  mmCtx.beginPath();mmCtx.moveTo(W/2,W/2);
  mmCtx.lineTo(W/2+Math.sin(-camYaw)*9,W/2+Math.cos(-camYaw)*9);mmCtx.stroke();
  mmCtx.restore();
  // Border
  mmCtx.strokeStyle='rgba(255,255,255,0.25)';mmCtx.lineWidth=1.5;
  mmCtx.beginPath();mmCtx.arc(W/2,W/2,W/2-1,0,Math.PI*2);mmCtx.stroke();
}

// ===== BIG MAP =====
function drawBigMap(){
  const bmc=document.getElementById('bigmap-canvas');
  const ctx=bmc.getContext('2d');
  const W=600,scale=W/(WORLD*2);
  // Terrain
  drawTerrainOnCanvas(ctx,W,scale,0,0);
  // Water patches (blue dots)
  ctx.fillStyle='rgba(26,110,168,0.7)';
  for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(W/2+Math.sin(i*1.1)*80*scale,W/2+Math.cos(i*0.9)*80*scale,8,0,Math.PI*2);ctx.fill();}
  // Trees
  ctx.fillStyle='rgba(20,70,20,0.55)';
  treePositions.forEach(t=>{
    const mx=W/2+t.x*scale,my=W/2+t.z*scale;
    ctx.beginPath();ctx.arc(mx,my,2.5,0,Math.PI*2);ctx.fill();
  });
  // Rocks
  ctx.fillStyle='rgba(100,90,80,0.6)';
  rockObjects.forEach(r=>{
    const mx=W/2+r.x*scale,my=W/2+r.z*scale;
    ctx.beginPath();ctx.arc(mx,my,3,0,Math.PI*2);ctx.fill();
  });
  // Ruins
  ctx.fillStyle='rgba(154,138,122,0.8)';
  ruinPositions.forEach(r=>{
    const mx=W/2+r.x*scale,my=W/2+r.z*scale;
    ctx.fillRect(mx-5,my-5,10,10);
    ctx.strokeStyle='rgba(200,180,160,0.5)';ctx.strokeRect(mx-5,my-5,10,10);
  });
  // Enemies
  enemies.forEach(e=>{
    if(e.dead)return;
    const mx=W/2+e.mesh.position.x*scale,my=W/2+e.mesh.position.z*scale;
    ctx.fillStyle=e.aggro?'#ff2222':'#ff6666';
    ctx.beginPath();ctx.arc(mx,my,4,0,Math.PI*2);ctx.fill();
  });
  // Player
  const px=W/2+player.position.x*scale,pz=W/2+player.position.z*scale;
  ctx.fillStyle='#4fc3f7';
  ctx.beginPath();ctx.arc(px,pz,6,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(px,pz);ctx.lineTo(px+Math.sin(-camYaw)*14,pz+Math.cos(-camYaw)*14);ctx.stroke();
  // Border
  ctx.strokeStyle='rgba(240,192,64,0.4)';ctx.lineWidth=2;ctx.strokeRect(0,0,W,W);
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  for(let g=0;g<W;g+=60){ctx.beginPath();ctx.moveTo(g,0);ctx.lineTo(g,W);ctx.stroke();ctx.beginPath();ctx.moveTo(0,g);ctx.lineTo(W,g);ctx.stroke();}
}

// ===== MAIN LOOP =====
const clock=new THREE.Clock();
let t=0,animTime=0,isMoving=false;
const camTarget=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  if(paused)return;
  const dt=Math.min(clock.getDelta(),0.05);t+=dt;

  // MOVEMENT
  let mx=0,mz=0;
  if(jActive){mx=jDx;mz=jDz;}
  if(keys['w']||keys['ArrowUp'])mz-=1;
  if(keys['s']||keys['ArrowDown'])mz+=1;
  if(keys['a']||keys['ArrowLeft'])mx-=1;
  if(keys['d']||keys['ArrowRight'])mx+=1;
  if(keys[" "])doJump();
  isMoving=(mx!==0||mz!==0);
  if(isMoving){
    const len=Math.sqrt(mx*mx+mz*mz);mx/=len;mz/=len;
    const wx=mx*Math.cos(camYaw)+mz*Math.sin(camYaw);
    const wz=-mx*Math.sin(camYaw)+mz*Math.cos(camYaw);
    const nx=player.position.x+wx*pState.speed*dt;
    const nz=player.position.z+wz*pState.speed*dt;
    if(!checkCollision(nx,player.position.z,0.4))player.position.x=Math.max(-WORLD,Math.min(WORLD,nx));
    if(!checkCollision(player.position.x,nz,0.4))player.position.z=Math.max(-WORLD,Math.min(WORLD,nz));
    player.rotation.y=Math.atan2(wx,wz);
  }

  // GRAVITY
  const groundY=getHeightAt(player.position.x,player.position.z);
  pState.velY+=GRAVITY*dt;player.position.y+=pState.velY*dt;
  let onRock=false;
  for(const r of rockObjects){
    const dx=player.position.x-r.x,dz=player.position.z-r.z;
    if(dx*dx+dz*dz<r.r*r.r*1.5&&player.position.y<r.topY+0.3&&pState.velY<=0){
      player.position.y=r.topY;onRock=true;break;
    }
  }
  if(player.position.y<=groundY&&!onRock){player.position.y=groundY;pState.velY=0;pState.onGround=true;}
  else if(!onRock)pState.onGround=false;
  else{pState.onGround=true;pState.velY=0;}
  if(jumpCD>0)jumpCD-=dt;

  // PLAYER ANIMATIONS
  animTime+=dt;
  const ll=player.getObjectByName('leftLeg'),rl=player.getObjectByName('rightLeg');
  const la=player.getObjectByName('leftArm'),ra2=player.getObjectByName('rightArm');
  const sg=player.getObjectByName('staffGroup'),orb=player.getObjectByName('orb'),glow=player.getObjectByName('glow');
  if(isMoving){
    const sw=Math.sin(animTime*10)*0.4;
    if(ll)ll.rotation.x=sw;if(rl)rl.rotation.x=-sw;
    if(la)la.rotation.x=-sw*0.5;if(attackCD<0.3&&ra2)ra2.rotation.x=sw*0.5;
    player.position.y=groundY+Math.abs(Math.sin(animTime*10))*0.06;
  } else {
    if(ll)ll.rotation.x*=0.8;if(rl)rl.rotation.x*=0.8;
    if(la)la.rotation.x*=0.8;if(attackCD<0.3&&ra2)ra2.rotation.x*=0.8;
  }
  if(sg)sg.position.y=Math.sin(t*2)*0.06;
  if(orb)orb.material.emissiveIntensity=0.5+Math.sin(t*4)*0.3;
  if(glow){glow.material.opacity=0.15+Math.sin(t*3)*0.1;glow.rotation.y=t*0.5;}

  // CAMERA
  const tcx=player.position.x+Math.sin(camYaw)*7;
  const tcz=player.position.z+Math.cos(camYaw)*7;
  const tcy=player.position.y+4+Math.sin(camPitch)*3.5;
  camera.position.lerp(new THREE.Vector3(tcx,tcy,tcz),0.1);
  camTarget.lerp(new THREE.Vector3(player.position.x,player.position.y+1.4,player.position.z),0.1);
  camera.lookAt(camTarget);

  // ENEMIES
  nearestEnemy=null;let nDist=999;
  enemies.forEach(e=>{
    if(e.dead)return;
    ['hpbar','hpbg'].forEach(n=>{const b=e.mesh.getObjectByName(n);if(b)b.lookAt(camera.position);});
    const dx=player.position.x-e.mesh.position.x,dz=player.position.z-e.mesh.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<nDist){nDist=dist;nearestEnemy=e;}
    if(dist<22)e.aggro=true;if(dist>40)e.aggro=false;
    if(e.aggro){
      const eh=getHeightAt(e.mesh.position.x,e.mesh.position.z);
      e.mesh.rotation.y=Math.atan2(dx,dz);e.moveTime+=dt;
      if(e.def.ranged){
        if(dist>8&&dist<25){e.mesh.position.x+=(dx/dist)*2*dt;e.mesh.position.z+=(dz/dist)*2*dt;}
        else if(dist<6){e.mesh.position.x-=(dx/dist)*2*dt;e.mesh.position.z-=(dz/dist)*2*dt;}
        e.shootTimer=(e.shootTimer||0)+dt;
        if(e.shootTimer>2.5){e.shootTimer=0;const from=e.mesh.position.clone().add(new THREE.Vector3(0,1.5,0));const to=player.position.clone().add(new THREE.Vector3(0,1,0));spawnProjectile(from,to,e.def.armorColor,e.def.dmg*0.7,false);}
      } else {
        if(dist>1.8*e.def.scale){e.mesh.position.x+=(dx/dist)*2.5*dt;e.mesh.position.z+=(dz/dist)*2.5*dt;}
        e.attackTimer+=dt;
        if(e.attackTimer>1.4&&dist<2.2*e.def.scale){
          e.attackTimer=0;
          const dmg=e.def.dmg*(0.75+Math.random()*0.5);
          pState.hp-=dmg;showDmg(dmg,false,false);hitFlash();updateHUD();
          if(pState.hp<=0)respawnPlayer();
        }
      }
      e.mesh.position.y+=(eh-e.mesh.position.y)*0.2;
      e.mesh.position.y=eh+Math.abs(Math.sin(e.moveTime*8))*0.04*e.def.scale;
    } else {
      e.moveTime+=dt;
      const eh=getHeightAt(e.startX,e.startZ);
      e.mesh.position.x=e.startX+Math.sin(e.moveTime*0.5+e.startZ)*0.8;
      e.mesh.position.z=e.startZ+Math.cos(e.moveTime*0.4+e.startX)*0.8;
      e.mesh.position.y=eh+Math.sin(e.moveTime*2)*0.04;
    }
  });

  updateProjectiles(dt);

  // PARTICLES
  for(let i=particleSystems.length-1;i>=0;i--){
    const ps=particleSystems[i];ps.life-=dt*1.3;ps.ps.material.opacity=Math.max(0,ps.life);
    const pos=ps.ps.geometry.attributes.position.array;
    for(let j=0;j<ps.vel.length;j+=3){pos[j]+=ps.vel[j]*dt;pos[j+1]+=ps.vel[j+1]*dt;pos[j+2]+=ps.vel[j+2]*dt;ps.vel[j+1]-=5*dt;}
    ps.ps.geometry.attributes.position.needsUpdate=true;
    if(ps.life<=0){scene.remove(ps.ps);particleSystems.splice(i,1);}
  }

  if(attackCD>0)attackCD-=dt;
  updateSkillUI(dt);
  pState.mp=Math.min(pState.maxMp,pState.mp+45*dt);
  pState.hp=Math.min(pState.maxHp,pState.hp+12*dt);
  updateHUD();updateEnemyHUD();drawMinimap();
  renderer.render(scene,camera);
}

animate();
setTimeout(()=>showNotif('🗺 Haritaya bas → Büyük harita!'),2500);
</script>
